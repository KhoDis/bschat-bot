services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: bschat
      POSTGRES_USER: bschat_user
      POSTGRES_PASSWORD: bschat_password
    networks:
      - bschat-net
    ports:
      - "5443:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    depends_on:
      - db
    env_file:
      - .env
    image: ghcr.io/khodis/prod-bschat-bot:latest
    volumes:
      - ./.env:/app/.env
    networks:
      - bschat-net
    restart: always
    # ДОБАВЛЯЕМ ЭТИ СТРОКИ:
    network_mode: "host"  # Это позволит контейнеру видеть localhost прокси
    # ИЛИ если не хотите host mode, используйте:
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    # environment:
    #   - HTTPS_PROXY=socks5://host.docker.internal:1080
    #   - HTTP_PROXY=socks5://host.docker.internal:1080

networks:
  bschat-net:
    name: bschat-net
    driver: bridge

volumes:
  pgdata: